<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>麻将游戏</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <!-- 大厅 -->
    <div id="lobby" class="view active">
      <div class="lobby-container">
        <div class="lobby-header">
          <h1>🀄 麻将游戏</h1>
          <p class="subtitle">四人局域网联机 · 红中赖子</p>
        </div>
        <div class="lobby-form">
          <div class="form-group">
            <label>昵称</label>
            <input type="text" id="playerName" placeholder="输入你的昵称" maxlength="8" value="">
          </div>
          <div class="btn-row">
            <button id="btnCreate" class="btn btn-primary" onclick="createRoom()">创建房间</button>
          </div>
          <div class="divider"><span>或</span></div>
          <div class="form-group">
            <label>房间号</label>
            <input type="text" id="roomId" placeholder="输入房间号" maxlength="4" style="text-transform:uppercase">
          </div>
          <div class="btn-row">
            <button id="btnJoin" class="btn btn-secondary" onclick="joinRoom()">加入房间</button>
          </div>
        </div>
      </div>
    </div>

    <!-- 房间等待 -->
    <div id="roomView" class="view">
      <div class="room-container">
        <div class="room-header">
          <h2>房间: <span id="roomCode"></span></h2>
          <button class="btn btn-small" onclick="copyRoomLink()">复制链接</button>
        </div>
        <div id="playerList" class="player-list"></div>
        <div class="room-actions">
          <button id="btnAddBot" class="btn btn-secondary" onclick="addBot()">添加机器人</button>
          <button id="btnStart" class="btn btn-primary" onclick="startGame()">开始游戏</button>
        </div>
        <div id="roomStatus" class="status-msg"></div>
      </div>
    </div>

    <!-- 游戏界面 -->
    <div id="gameView" class="view">
      <div class="game-table">
        <!-- 顶部信息栏 -->
        <div class="game-info">
          <span id="wallCount">余: 0</span>
          <span id="turnInfo">等待中</span>
          <span id="roomInfo"></span>
        </div>

        <!-- 对面玩家 (上) -->
        <div id="playerTop" class="player-area top">
          <div class="player-label"><span class="player-name"></span></div>
          <div class="player-melds melds-top"></div>
          <div class="player-tiles tiles-row tiles-hidden"></div>
        </div>

        <!-- 中间区域 -->
        <div class="middle-row">
          <!-- 左边玩家 -->
          <div id="playerLeft" class="player-area left">
            <div class="player-label"><span class="player-name"></span></div>
            <div class="player-melds melds-left"></div>
            <div class="player-tiles tiles-col tiles-hidden"></div>
          </div>

          <!-- 牌河 (中间) -->
          <div id="discardArea" class="discard-area">
            <div class="discard-inner"></div>
          </div>

          <!-- 右边玩家 -->
          <div id="playerRight" class="player-area right">
            <div class="player-label"><span class="player-name"></span></div>
            <div class="player-melds melds-right"></div>
            <div class="player-tiles tiles-col tiles-hidden"></div>
          </div>
        </div>

        <!-- 我的牌 (下) -->
        <div id="playerBottom" class="player-area bottom">
          <div class="player-melds melds-bottom"></div>
          <div id="myHand" class="my-hand"></div>
        </div>

        <!-- 操作按钮 -->
        <div id="actionBar" class="action-bar hidden">
          <button id="btnHu" class="btn btn-action btn-hu" onclick="doAction('hu')">胡</button>
          <button id="btnGang" class="btn btn-action btn-gang" onclick="doAction('gang')">杠</button>
          <button id="btnPeng" class="btn btn-action btn-peng" onclick="doAction('peng')">碰</button>
          <button id="btnPass" class="btn btn-action btn-pass" onclick="doAction('pass')">过</button>
        </div>

        <!-- 状态提示 -->
        <div id="gameStatus" class="game-status hidden"></div>
      </div>
    </div>

    <!-- 游戏结束弹窗 -->
    <div id="gameOverModal" class="modal hidden">
      <div class="modal-content">
        <h2 id="gameOverTitle">游戏结束</h2>
        <div id="gameOverInfo"></div>
        <button class="btn btn-primary" onclick="restartGame()">再来一局</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
